<!doctype html>

<html lang="en">

<head>

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>OOPS | Leadership Hosting</title>

  <meta name="description" content="About Leadership Hosting." />


  <style>

    :root{--bg:#0f1115;--card:#151923;--card2:#121622;--text:#e9ecf1;--muted:#b7bfcc;--muted2:#8f98a6;--line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.08);--radius:16px}

    *{box-sizing:border-box} html,body{height:100%}

    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text);line-height:1.45}

    a{color:inherit;text-decoration:none} .wrap{max-width:900px;margin:0 auto;padding:22px 16px 54px}

    header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:10px 0 18px}

    .brand{display:flex;align-items:center;gap:12px;min-width:220px}

    .brand h1{margin:0;font-size:14px;letter-spacing:.14em;text-transform:uppercase}

    .brand p{margin:3px 0 0;color:var(--muted2);font-size:12px;max-width:52ch}

    nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;padding-top:2px}

    .pill{padding:9px 11px;border-radius:999px;background:rgba(255,255,255,.03);border:1px solid var(--line2);color:var(--muted);font-size:13px;transition:transform .12s ease,border-color .12s ease,background .12s ease}

    .pill:hover{transform:translateY(-1px);background:rgba(255,255,255,.05);border-color:var(--line);color:var(--text)}

    @media (max-width:760px){header{flex-direction:column}nav{justify-content:flex-start}}

    section{margin-top:12px}

    .card{background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);padding:18px 16px}

    .hero{padding:22px 18px}

    h2{margin:14px 0 10px;font-size:34px;letter-spacing:-.02em;line-height:1.08}

    .sub{margin:0 0 14px;color:var(--muted);font-size:15px;line-height:1.65;max-width:70ch}

    .cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:11px 13px;border-radius:14px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:rgba(255,255,255,.92);font-size:14px;transition:transform .12s ease,border-color .12s ease,background .12s ease;user-select:none}

    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.05);border-color:var(--line)}

    .btn.primary{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.06)}

    .fine{margin-top:12px;color:var(--muted2);font-size:12px}

    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}

    .stack{display:flex;flex-direction:column;gap:12px}

    .card h3{margin:0 0 8px;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.84)}

    .card p{margin:0;color:var(--muted);font-size:14px;line-height:1.65}

    .divider{height:1px;background:rgba(255,255,255,.10);margin:18px 0 0}

    footer{margin-top:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;color:var(--muted2);font-size:12px;flex-wrap:wrap}

    .card.alt{background:var(--card2)}

    .logo{
      width:42px;
      height:42px;
      border-radius:14px;
      background:#1a1f2b;
      border:1px solid var(--line);
      position:relative;
      flex:0 0 auto;
      overflow:hidden;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

        .footer-image{
      position:relative;
      margin-top:18px;
      border-radius:var(--radius);
      overflow:hidden;
      border:1px solid var(--line2);
    }

    .footer-image img{
      width:100%;
      height:160px;
      object-fit:cover;
      display:block;
      filter:brightness(.55);
    }

    .footer-overlay{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      padding:14px 16px;
      color:var(--text);
      font-size:12px;
    }

  </style>

</head>


<body>

  <div class="wrap">
    <section>

      <div class="card hero">

        <h2>Oops..</h2>

        <p class="sub">

         Uh oh, we dont know exactly what happened, all we know is that Leadership Hosting's servers arent working... Try again later.

        </p>
      </div>
    </section>
   </div>
</body>

</html>
